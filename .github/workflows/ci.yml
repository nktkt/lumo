# CI for Lumo.
#
# NOTE: LLVM 22 is brand new and its packaging on hosted CI runners is still
# evolving. The install steps below (the `brew install llvm@22` formula on
# macOS and the apt.llvm.org `llvm.sh 22` script + `/usr/lib/llvm-22` prefix on
# Linux) and the `LLVM_SYS_221_PREFIX` paths may need adjusting after the first
# run, depending on what the runners actually provide.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM 22 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@22
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm@22)" >> "$GITHUB_ENV"

      - name: Install LLVM 22 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          # llvm-config lists Polly among the static libs, but its archives ship
          # in a separate dev package — install it so static linking succeeds.
          sudo apt-get install -y llvm-22-dev libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
